name: OrangeFox Build Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup and Install Tools
        run: |
          sudo apt-get update || true
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
          libxml2-utils xsltproc unzip python3 rsync

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync OrangeFox
        run: |
          mkdir fox && cd fox
          git config --global user.email "build@fox.com"
          git config --global user.name "Builder"
          # Используем GitHub зеркало, оно стабильнее для Actions
          repo init -u https://github.com/OrangeFoxRecovery/Manifest.git -b fox_12.1 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Add Your Device Tree
        run: |
          mkdir -p fox/device/xiaomi/serenity
          # Копируем файлы из корня репозитория в папку дерева
          rsync -av --exclude='.git' --exclude='.github' --exclude='fox' ./ fox/device/xiaomi/serenity/

      - name: Start Build
        run: |
          cd fox
          set -e
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_REPLACE_TOOLBOX_GETPROP=1
          lunch omni_serenity-eng
          mka recoveryimage -j$(nproc)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Recovery-Serenity
          path: fox/out/target/product/serenity/recovery.img
